<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Automatismes DNB — 3e</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;min-height:100vh;padding:1rem;}
.wrap{max-width:680px;margin:0 auto;}

.hero{background:#185FA5;border-radius:16px;padding:1.8rem 1.5rem;text-align:center;margin-bottom:1.2rem;color:#E6F1FB;}
.hero h1{font-size:21px;font-weight:600;margin:0 0 5px;}
.hero p{font-size:13px;opacity:.85;margin:0;}

.theme-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-bottom:1rem;}
.th-btn{background:#fff;border:1.5px solid #ddd;border-radius:12px;padding:.9rem .8rem;cursor:pointer;text-align:left;transition:border-color .15s,box-shadow .15s;width:100%;}
.th-btn:hover{box-shadow:0 2px 10px rgba(0,0,0,.1);}
.th-btn.active{color:#fff;border-width:2px;}
.th-btn .icon{font-size:20px;margin-bottom:6px;display:block;}
.th-btn .num{font-size:10px;opacity:.7;font-weight:600;letter-spacing:.5px;text-transform:uppercase;}
.th-btn .label{font-size:13px;font-weight:600;line-height:1.3;margin-top:2px;}
.th-btn .cnt{font-size:11px;opacity:.65;margin-top:3px;}
.t0{border-color:#333!important;}.t0.active{background:#333;}
.t1{border-color:#185FA5!important;}.t1.active{background:#185FA5;}
.t2{border-color:#2e7d32!important;}.t2.active{background:#2e7d32;}
.t3{border-color:#e65100!important;}.t3.active{background:#e65100;}
.t4{border-color:#6a1b9a!important;}.t4.active{background:#6a1b9a;}
.t5{border-color:#006064!important;}.t5.active{background:#006064;}

.scorebar{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#fff;border-radius:10px;margin-bottom:.7rem;font-size:13px;border:1px solid #e0e0e0;}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;}
.dg{background:#3B6D11;}.dr{background:#E24B4A;}
.streak{margin-left:auto;font-weight:600;color:#333;}

.prog-wrap{height:5px;background:#ddd;border-radius:3px;margin-bottom:.8rem;}
.prog-fill{height:100%;background:#185FA5;border-radius:3px;transition:width .3s;}

.qcard{background:#fff;border-radius:14px;padding:1.4rem;border:1px solid #e0e0e0;}
.qbadge{display:inline-block;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700;margin-bottom:10px;}
.b1{background:#ddeeff;color:#185FA5;}
.b2{background:#e8f5e9;color:#2e7d32;}
.b3{background:#fff3e0;color:#e65100;}
.b4{background:#f3e5f5;color:#6a1b9a;}
.b5{background:#e0f7fa;color:#006064;}
.qtext{font-size:18px;color:#1a1a1a;line-height:1.6;margin-bottom:1.1rem;}
.qtext em{font-style:normal;font-weight:700;color:#185FA5;}
.arow{display:flex;gap:8px;align-items:center;}
.ainput{flex:1;padding:10px 14px;border:1.5px solid #ccc;border-radius:9px;font-size:16px;color:#1a1a1a;outline:none;transition:border-color .15s;}
.ainput:focus{border-color:#185FA5;box-shadow:0 0 0 3px rgba(24,95,165,.12);}
.ainput.ok{border-color:#3B6D11;background:#EAF3DE;color:#27500A;}
.ainput.ko{border-color:#A32D2D;background:#FCEBEB;color:#791F1F;}
.vbtn{padding:10px 20px;border-radius:9px;border:none;background:#185FA5;color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:background .15s;white-space:nowrap;}
.vbtn:hover{background:#0C447C;}
.vbtn:disabled{background:#bbb;cursor:default;}
.hbtn{font-size:12px;color:#888;background:none;border:none;cursor:pointer;margin-top:8px;text-decoration:underline;display:block;}
.hint{font-size:13px;color:#555;margin-top:6px;padding:8px 12px;background:#f5f7fa;border-radius:8px;border-left:3px solid #185FA5;display:none;}
.fb{margin-top:10px;padding:10px 14px;border-radius:8px;font-size:14px;line-height:1.5;display:none;}
.fb-ok{background:#EAF3DE;color:#27500A;border:1px solid #97C459;}
.fb-ko{background:#FCEBEB;color:#791F1F;border:1px solid #F09595;}
.nbtn{width:100%;padding:10px;border-radius:9px;border:1.5px solid #ddd;background:#fff;color:#1a1a1a;font-size:14px;font-weight:600;cursor:pointer;margin-top:10px;display:none;transition:background .15s;}
.nbtn:hover{background:#f0f4ff;border-color:#185FA5;}

.fin{text-align:center;padding:2.5rem 1rem;}
.fin .emoji{font-size:56px;margin-bottom:.8rem;}
.fin h2{font-size:26px;font-weight:700;color:#1a1a1a;margin-bottom:6px;}
.fin p{font-size:15px;color:#555;margin-bottom:1.4rem;}
.rbtn{padding:11px 32px;border-radius:10px;border:none;background:#185FA5;color:#fff;font-size:15px;font-weight:700;cursor:pointer;}
.rbtn:hover{background:#0C447C;}

@media(max-width:480px){
  .arow{flex-direction:column;}
  .vbtn{width:100%;}
  .th-btn .label{font-size:12px;}
}
</style>
</head>

var THEMES=[
  {id:"Tout",label:"Tout",icon:"⚡",num:"Tous thèmes",cls:"t0"},
  {id:T1,label:"Nombres et calculs",icon:"🔢",num:"Thème 1",cls:"t1"},
  {id:T2,label:"Espace et géométrie",icon:"📐",num:"Thème 2",cls:"t2"},
  {id:T3,label:"Données et probabilités",icon:"📊",num:"Thème 3",cls:"t3"},
  {id:T4,label:"Proportionnalité & fonctions",icon:"📈",num:"Thème 4",cls:"t4"},
  {id:T5,label:"Algorithmique & prog.",icon:"💻",num:"Thème 5",cls:"t5"},
];

var qs=[],cur=0,good=0,bad=0,streak=0,answered=false,activeCat=null;

function buildThemes(){
  var el=document.getElementById("themes");
  el.innerHTML="";
  THEMES.forEach(function(t){
    var pool=t.id==="Tout"?QQ:QQ.filter(function(q){return q.c===t.id;});
    var b=document.createElement("button");
    b.className="th-btn "+t.cls+(activeCat===t.id?" active":"");
    b.innerHTML='<span class="icon">'+t.icon+'</span><div class="num">'+t.num+'</div><div class="label">'+t.label+'</div><div class="cnt">'+pool.length+' questions</div>';
    b.onclick=function(){activeCat=t.id;buildThemes();load();};
    el.appendChild(b);
  });
}

function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}

function load(){
  var pool=activeCat==="Tout"?QQ:QQ.filter(function(q){return q.c===activeCat;});
  qs=shuffle(pool.slice());
  cur=0;good=0;bad=0;streak=0;
  updateScore();showQ();
}

function showQ(){
  if(cur>=qs.length){endSession();return;}
  answered=false;
  var q=qs[cur];
  document.getElementById("prog").style.width=(cur/qs.length*100)+"%";
  document.getElementById("qcard").innerHTML=
    '<span class="qbadge '+q.b+'">'+q.c+'</span>'+
    '<span style="float:right;font-size:12px;color:#aaa;">'+(cur+1)+'/'+qs.length+'</span>'+
    '<div style="clear:both"></div>'+
    '<div class="qtext">'+q.q+'</div>'+
    '<div class="arow">'+
      '<input class="ainput" id="ans" type="text" placeholder="Ta réponse…" autocomplete="off" inputmode="decimal"/>'+
      '<button class="vbtn" id="vbtn" onclick="daCheck()">Valider</button>'+
    '</div>'+
    '<button class="hbtn" onclick="daShowHint()">💡 Voir l\'indice</button>'+
    '<div class="hint" id="hint">'+q.h+'</div>'+
    '<div class="fb" id="fb"></div>'+
    '<button class="nbtn" id="nbtn" onclick="daNext()">Question suivante →</button>';
  document.getElementById("ans").addEventListener("keydown",function(e){
    if(e.key==="Enter"){if(!answered)daCheck();else daNext();}
  });
  setTimeout(function(){try{document.getElementById("ans").focus();}catch(x){}},100);
}

function norm(s){return s.trim().replace(/\s+/g,"").replace(/,/g,".").toLowerCase();}

window.daCheck=function(){
  if(answered)return;
  var q=qs[cur];
  var raw=document.getElementById("ans").value;
  if(!raw.trim())return;
  answered=true;
  var ok=q.a.some(function(a){return norm(String(a))===norm(raw);});
  var inp=document.getElementById("ans");
  var fb=document.getElementById("fb");
  if(ok){
    inp.className="ainput ok";
    fb.className="fb fb-ok";
    fb.innerHTML="✓ Correct ! <strong>"+q.e+"</strong>";
    good++;streak++;
  }else{
    inp.className="ainput ko";
    fb.className="fb fb-ko";
    fb.innerHTML="✗ Réponse : <strong>"+q.a[0]+"</strong> — "+q.e;
    bad++;streak=0;
  }
  fb.style.display="block";
  inp.disabled=true;
  document.getElementById("vbtn").disabled=true;
  document.getElementById("nbtn").style.display="block";
  updateScore();
};

window.daNext=function(){cur++;showQ();};
window.daShowHint=function(){var h=document.getElementById("hint");if(h)h.style.display="block";};

function updateScore(){
  document.getElementById("good").textContent=good;
  document.getElementById("bad").textContent=bad;
  document.getElementById("streak").textContent=streak+(streak>=3?" 🔥":"");
}

function endSession(){
  var total=good+bad;
  var pct=total?Math.round(good/total*100):0;
  var emoji=pct>=80?"🏆":pct>=60?"💪":"📚";
  var msg=pct>=80?"Excellent ! Tu maîtrises ce thème.":pct>=60?"Bon travail, continue !":"Retente, les progrès viendront !";
  document.getElementById("prog").style.width="100%";
  document.getElementById("qcard").innerHTML=
    '<div class="fin">'+
    '<div class="emoji">'+emoji+'</div>'+
    '<h2>'+pct+' % de réussite</h2>'+
    '<p>'+good+' correctes · '+bad+' erreurs<br><em>'+msg+'</em></p>'+
    '<button class="rbtn" onclick="daRestart()">Recommencer ce thème</button>'+
    '</div>';
}
window.daRestart=function(){load();};
buildThemes();
</script>
